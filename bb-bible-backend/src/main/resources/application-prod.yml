spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: ${DB_MAX_POOL_SIZE:3}
      minimum-idle: ${DB_MIN_IDLE:1}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false

supabase:
  jwks-url: ${SUPABASE_JWKS_URL}
  jwt-issuer: ${SUPABASE_JWT_ISSUER}

web-push:
  public-key: ${WEB_PUSH_PUBLIC_KEY}
  private-key: ${WEB_PUSH_PRIVATE_KEY}
  subject: ${WEB_PUSH_SUBJECT}

push:
  scheduler:
    secret: ${PUSH_SCHEDULER_SECRET:}
